name: synthora_ai
description: Synthora AI - AI-Powered Image Fusion
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Firebase missing because we need to run flutter pub add
  # But we can add them manually
  firebase_core: any
  firebase_auth: any
  google_sign_in: any
  
  # State management and Navigation
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.1

  # Fonts and Styling
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0
  font_awesome_flutter: ^11.0.0
  http: ^1.6.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  razorpay_web: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
